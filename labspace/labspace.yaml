title: Running NVIDIA NemoClaw on OpenShell with Nemotron Inference
description: |
  Learn how to set up NVIDIA NemoClaw inside an OpenShell sandbox on Linux,
  configure Nemotron-3-Nano inference via NVIDIA NIM, apply declarative YAML
  policies, and run an AI agent securely with policy-enforced egress.
